<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🎁 open · gift box</title>
  <style>
    /* RESET & GLOBAL — pure white background, modern clean look */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #ffffff;           /* pure white background */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem 1.2rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      color: #1e293b;                /* dark slate for text */
    }

    /* main heading – subtle, disappears after opening */
    h2 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 2rem;
      color: #334155;
      background: rgba(255,255,255,0.8);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    /* ----- GIFT BOX (emoji but large & boxlike) ----- */
    #gift {
      font-size: clamp(140px, 60vw, 300px);  /* 60% of screen width, huge & responsive */
      line-height: 1;
      cursor: pointer;
      display: inline-block;
      transform-origin: center center;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.1));
      animation: bounceIn 0.7s ease forwards;   /* popping entry animation */
      margin: 0.2rem 0;
      text-shadow: 2px 8px 12px rgba(0,0,0,0.08);
      z-index: 20;
      /* extra gift personality */
      transform: scale(1);
    }

    /* popping / bounce animation on page load */
    @keyframes bounceIn {
      0% { transform: scale(0.2); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      80% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* opening animation: playful shake + scale */
    #gift.open {
      transform: scale(1.5) rotate(8deg) !important;
      transition: transform 0.4s cubic-bezier(0.25, 1.3, 0.5, 1.2);
    }

    /* result image container */
    #result {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 1rem 0 0.5rem;
    }

    /* gift image — full width, centered, smooth pop */
    #result img {
      width: 100%;
      max-width: 500px;        /* extra large but stays centered */
      height: auto;
      border-radius: 32px;
      box-shadow: 0 20px 30px -8px rgba(0,0,0,0.15);
      animation: popWinner 0.6s cubic-bezier(0.21, 1.11, 0.38, 1.1);
      border: 2px solid rgba(255,255,255,0.5);
      background: #fafafa;
    }

    @keyframes popWinner {
      0% { transform: scale(0.3); opacity: 0; }
      80% { transform: scale(1.03); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* big congratulations message */
    #winner {
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 700;
      margin-top: 20px;
      display: none;
      color: #0f172b;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 5px rgba(251,191,36,0.2);
      letter-spacing: -0.5px;
      line-height: 1.2;
      text-align: center;
      padding: 0 0.2rem;
      z-index: 15;
    }

    /* confetti canvas – fullscreen, no blocking */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 30;
    }

    /* hide heading & gift after open – we control via js */
    .hidden {
      display: none !important;
    }

    /* little extra style for smoothness */
    #gift:active {
      transform: scale(0.95);
      transition: transform 0.1s;
    }

    /* no extra distractions */
    audio {
      display: none;
    }
  </style>
</head>
<body>

  <h2 id="heading">🎁 tap the gift</h2>

  <!-- large gift box (emoji, but behaves like a box) -->
  <div id="gift" onclick="handleGiftTap()">🎁</div>

  <!-- container for the random gift image -->
  <div id="result"></div>

  <!-- big winner message -->
  <div id="winner">🎉 Congratulations! You Won 🎉</div>

  <!-- hidden audio for opening effect -->
  <audio id="giftSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3" type="audio/mpeg">
    <!-- fallback – just in case, but the url should work -->
  </audio>

  <!-- confetti canvas -->
  <canvas id="confettiCanvas"></canvas>

  <script>
    (function() {
      // --- DOM elements ---
      const gift = document.getElementById('gift');
      const heading = document.getElementById('heading');
      const resultDiv = document.getElementById('result');
      const winnerDiv = document.getElementById('winner');
      const sound = document.getElementById('giftSound');
      const canvas = document.getElementById('confettiCanvas');
      
      // --- state ---
      let isOpened = false;             // prevent double tap
      let confettiActive = false;
      let pieces = [];
      let animationFrame = null;

      // --- 10 random gift images (variety from picsum, some fixed for consistency) ---
      const giftImages = [
        'https://picsum.photos/id/1084/600/800?grayscale',   // gift-like? bear
        'https://picsum.photos/id/100/600/800',              // camera
        'https://picsum.photos/id/1015/600/800',             // mountains
        'https://picsum.photos/id/1043/600/800',             // face
        'https://picsum.photos/id/1/600/800',                // laptop
        'https://picsum.photos/id/145/600/800',              // sand
        'https://picsum.photos/id/15/600/800',                // leaves
        'https://picsum.photos/id/16/600/800',                // waterfall
        'https://picsum.photos/id/17/600/800',                // valley
        'https://picsum.photos/id/18/600/800'                 // barn
      ];

      // ---------- helper: generate confetti pieces (colorful) ----------
      function initConfetti(width, height) {
        const newPieces = [];
        for (let i = 0; i < 180; i++) {
          newPieces.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 6 + 3,            // radius 3–9px
            speedY: Math.random() * 3 + 2,        // falling speed
            color: `hsl(${Math.random() * 360}, 85%, 65%)`, // vibrant
            angle: Math.random() * Math.PI * 2,
          });
        }
        return newPieces;
      }

      // ---------- start confetti animation ----------
      function startConfetti() {
        if (confettiActive) return;
        confettiActive = true;

        // set canvas size to current window
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;

        // create pieces with fresh colors
        pieces = initConfetti(w, h);

        // drawing function
        function drawConfetti() {
          if (!confettiActive) return;

          // always match canvas size (in case of orientation change)
          const currentW = window.innerWidth;
          const currentH = window.innerHeight;
          
          if (canvas.width !== currentW || canvas.height !== currentH) {
            canvas.width = currentW;
            canvas.height = currentH;
            // rescale existing pieces proportionally (avoid sharp reset)
            pieces.forEach(p => {
              p.x = (p.x / canvas.width) * currentW || Math.random() * currentW;
              p.y = (p.y / canvas.height) * currentH || Math.random() * currentH;
            });
            canvas.width = currentW;
            canvas.height = currentH;
          }

          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let i = 0; i < pieces.length; i++) {
            const p = pieces[i];
            
            // draw confetti piece (circle)
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            // add slight sparkle / variation
            ctx.shadowColor = 'rgba(255,255,255,0.5)';
            ctx.shadowBlur = 4;
            
            // move piece
            p.y += p.speedY * 0.6;  // smooth fall
            // slight horizontal drift for natural effect
            p.x += Math.sin(p.angle) * 0.4;
            p.angle += 0.02;

            // reset if below canvas
            if (p.y > canvas.height + 20) {
              p.y = -20;
              p.x = Math.random() * canvas.width;
            }
            if (p.x > canvas.width + 20) p.x = -20;
            if (p.x < -20) p.x = canvas.width + 20;
          }

          animationFrame = requestAnimationFrame(drawConfetti);
        }

        drawConfetti();
      }

      // ---------- stop confetti (if needed, but we keep it forever) ----------
      // not needed, but we can stop if required – we let it run

      // ---------- window resize: smoothly update confetti ----------
      window.addEventListener('resize', () => {
        if (confettiActive) {
          const w = window.innerWidth;
          const h = window.innerHeight;
          canvas.width = w;
          canvas.height = h;
          // no need to regenerate, draw loop adjusts positions proportionally 
        }
      });

      // ---------- main gift opening logic ----------
      window.handleGiftTap = function() {
        // prevent double opening / multiple taps
        if (isOpened) return;
        isOpened = true;

        // 1. play gift opening sound (with user interaction)
        if (sound) {
          sound.play().catch(e => console.log('audio play prevented (autoplay policy), but tap is ok, usually works', e));
        }

        // 2. add opening animation class
        gift.classList.add('open');

        // 3. after short animation, replace with image & winner, hide gift/heading
        setTimeout(() => {
          // pick random image from array
          const randomIndex = Math.floor(Math.random() * giftImages.length);
          const imgUrl = giftImages[randomIndex];

          // inject image into result div
          resultDiv.innerHTML = `<img src="${imgUrl}" alt="random gift" />`;

          // show winner message
          winnerDiv.style.display = 'block';

          // hide gift and heading smoothly
          gift.style.display = 'none';
          heading.style.display = 'none';

          // 4. start colorful confetti
          startConfetti();

        }, 600); // wait 0.6s to enjoy opening animation
      };

      // optional: pre-tap safeguard — ensure no double calls from rapid taps
      // we already have isOpened flag.

      // clean up animation frame on page unload (good practice)
      window.addEventListener('beforeunload', () => {
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
        }
      });

      // tiny extra: ensure gift is visible if someone reloads mid-state
      // but we want fresh start always: reset on page load
      window.addEventListener('load', function() {
        // reset all to initial (in case of back navigation)
        isOpened = false;
        gift.style.display = 'inline-block';
        heading.style.display = 'block';
        resultDiv.innerHTML = '';
        winnerDiv.style.display = 'none';
        gift.classList.remove('open');
        // stop any confetti from previous session
        if (confettiActive) {
          confettiActive = false;
          if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
          }
          // clear canvas
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        // reset confetti flag
        confettiActive = false;
      });

      // also orientation/resize already handled inside draw
    })();
  </script>

  <!-- tiny extra style for white background guarantee -->
  <style>
    /* ensure white stays white */
    body { background: #ffffff; }
    /* make winner message pop on white */
    #winner {
      -webkit-text-stroke: 1px rgba(255,255,255,0.5);
    }
    /* gift subtle hover (but mobile doesn't hover) */
  </style>

</body>
</html>
