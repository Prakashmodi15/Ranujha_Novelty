<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open Your Gift</title>

<style>

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:sans-serif;
color:white;
}

#gift{
font-size:120px;
cursor:pointer;
transition:transform .5s;
}

#gift.open{
transform:rotateX(180deg) scale(1.3);
}

#result img{
margin-top:20px;
max-width:300px;
border-radius:12px;
animation:pop .6s ease;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<div id="gift" onclick="openGift()">🎁</div>

<div id="result"></div>

<script>

function openGift(){

let gift=document.getElementById("gift");

gift.classList.add("open");

let gifts=[

"https://picsum.photos/400?random=1",
"https://picsum.photos/400?random=2",
"https://picsum.photos/400?random=3",
"https://picsum.photos/400?random=4",
"https://picsum.photos/400?random=5",
"https://picsum.photos/400?random=6",
"https://picsum.photos/400?random=7",
"https://picsum.photos/400?random=8",
"https://picsum.photos/400?random=9",
"https://picsum.photos/400?random=10"

];

let random=Math.floor(Math.random()*gifts.length);

setTimeout(function(){

document.getElementById("result").innerHTML =
'<img src="'+gifts[random]+'">';

gift.style.display="none";

},600);

}

</script>

</body>
</html>
